<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Token Bridge</title>

    <!-- Manrope + JetBrains Mono from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* CSS Variables - Design System Foundation */
      :root {
        /* Typography */
        --font-family-base:
          "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        --font-family-mono:
          "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        --font-weight-regular: 400;
        --font-weight-medium: 500;
        --font-weight-semibold: 600;
        --font-weight-bold: 700;

        /* Font Sizes */
        --font-size-xs: 10px;
        --font-size-sm: 11px;
        --font-size-base: 12px;
        --font-size-md: 13px;
        --font-size-lg: 14px;
        --font-size-xl: 16px;
        --font-size-2xl: 18px;

        /* Line Heights */
        --line-height-tight: 1.2;
        --line-height-normal: 1.4;
        --line-height-relaxed: 1.6;

        /* Spacing Scale (4px base grid) */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --space-10: 40px;

        /* Border Radius */
        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
        --radius-xl: 12px;

        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(20, 20, 40, 0.06);
        --shadow-md: 0 4px 12px -2px rgba(20, 20, 40, 0.10), 0 2px 4px -2px rgba(20, 20, 40, 0.06);
        --shadow-lg: 0 8px 24px -4px rgba(20, 20, 40, 0.12);
        --shadow-xl: 0 16px 40px -8px rgba(20, 20, 40, 0.15);

        /* Transitions */
        --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);

        /* Colors - Light Theme (Wylie Dog system, sRGB-translated from OKLCH) */
        --surface-primary: #ffffff;
        --surface-secondary: #f7f7f9;
        --surface-tertiary: #eeeef2;
        --surface-elevated: #ffffff;
        --surface-overlay: rgba(15, 15, 18, 0.5);

        --text-primary: #0f0f12;
        --text-secondary: #5c5c6e;
        --text-tertiary: #9191a3;
        --text-inverse: #ffffff;

        --border-light: #f0f0f5;
        --border-default: #e2e2ea;
        --border-strong: #c8c8d8;

        --accent-primary: #3554a6;
        --accent-primary-hover: #2a4396;
        --accent-tint: #eef1fb;
        --accent-secondary: #3554a6;
        --accent-secondary-hover: #2a4396;

        --success: #1a9e6c;
        --success-hover: #158a5c;
        --success-light: #e6f7f2;

        --error: #c63b28;
        --error-hover: #b03221;
        --error-light: #fdecea;

        --warning: #c88a00;
        --warning-hover: #b07800;
        --warning-light: #fef8e6;

        /* info aliases accent for Wylie Dog system */
        --info: #3554a6;
        --info-hover: #2a4396;
        --info-light: #eef1fb;
      }

      /* Dark Theme (auto-detects Figma theme) */
      @media (prefers-color-scheme: dark) {
        :root {
          --surface-primary: #1c1c1f;
          --surface-secondary: #262629;
          --surface-tertiary: #313135;
          --surface-elevated: #2a2a2e;
          --surface-overlay: rgba(0, 0, 0, 0.7);

          --text-primary: #f0f0f5;
          --text-secondary: #9191a3;
          --text-tertiary: #5c5c6e;
          --text-inverse: #0f0f12;

          --border-light: #2a2a2e;
          --border-default: #3a3a42;
          --border-strong: #52525c;

          --accent-primary: #6b8ef5;
          --accent-primary-hover: #5a7be8;
          --accent-tint: #262a3a;
          --accent-secondary: #6b8ef5;
          --accent-secondary-hover: #5a7be8;

          --success: #34c98a;
          --success-hover: #2bb578;
          --success-light: #162b22;

          --error: #f06b56;
          --error-hover: #e85540;
          --error-light: #2d1614;

          --warning: #f0b429;
          --warning-hover: #e0a418;
          --warning-light: #2b1f08;

          --info: #6b8ef5;
          --info-hover: #5a7be8;
          --info-light: #262a3a;
        }
      }

      /* Base Styles */
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: var(--font-family-base);
        font-size: var(--font-size-base);
        font-weight: var(--font-weight-regular);
        line-height: var(--line-height-normal);
        background: var(--surface-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Typography Utilities */
      .text-xs {
        font-size: var(--font-size-xs);
      }
      .text-sm {
        font-size: var(--font-size-sm);
      }
      .text-base {
        font-size: var(--font-size-base);
      }
      .text-md {
        font-size: var(--font-size-md);
      }
      .text-lg {
        font-size: var(--font-size-lg);
      }
      .text-xl {
        font-size: var(--font-size-xl);
      }
      .text-2xl {
        font-size: var(--font-size-2xl);
      }

      .font-regular {
        font-weight: var(--font-weight-regular);
      }
      .font-medium {
        font-weight: var(--font-weight-medium);
      }
      .font-semibold {
        font-weight: var(--font-weight-semibold);
      }
      .font-bold {
        font-weight: var(--font-weight-bold);
      }

      /* Color Utilities */
      .text-primary {
        color: var(--text-primary);
      }
      .text-secondary {
        color: var(--text-secondary);
      }
      .text-tertiary {
        color: var(--text-tertiary);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./App.tsx"></script>
  </body>
</html>
