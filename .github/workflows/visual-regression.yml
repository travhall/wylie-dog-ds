name: Visual Regression

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    name: Playwright Visual Diff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm --filter storybook exec playwright install --with-deps chromium

      - name: Build Storybook
        run: pnpm --filter storybook build

      - name: Serve Storybook
        run: pnpm --filter storybook exec serve storybook-static -l 4173 --no-clipboard &
        env:
          CI: "true"

      - name: Wait for Storybook
        run: npx wait-on http://localhost:4173 -t 60000

      - name: Run Visual Tests
        working-directory: apps/storybook
        env:
          CI: "true"
          STORYBOOK_URL: http://localhost:4173
        run: pnpm test:visual

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/storybook/playwright-report/
          retention-days: 14

      - name: Upload Diff Snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: apps/storybook/test-results/
          retention-days: 14
